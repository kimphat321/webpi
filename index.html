<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Quán Pho Quynh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(243, 171, 171, 0.5);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
        }
        h1 { color: #000000; margin-bottom: 10px; }
        p { color: #000000; margin-bottom: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
        }
        .btn-connect {
            background: #667eea;
            color: white;
        }
        .terms {
            font-size: 12px;
            color: #000000;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div><img src="logo.png" alt="Logo" width="120"></div>
        <h1>Bienvenue chez Pho Quynh</h1>
        <p>suivi notre Instagram maitenant </p>
        
        <!-- Nút Follow Instagram -->
        <a href="https://www.instagram.com/phoquynh.torcy/" 
           target="_blank" 
           class="btn btn-instagram"
           id="instaBtn">
            📸 Suivre Instagram
        </a>
        
        <!-- Nút kết nối -->
        <button onclick="connectWifi()" class="btn btn-connect">
            ✅ Connecter au WiFi <br> decouvrez notre menu en ligne
        </button>
        
        <p class="terms">
            En vous connectant, vous acceptez les conditions d'utilisation du service Internet.
            <br>Wi-Fi gratuit – Débit potentiellement limité.
        </p>
    </div>

    <script>
        function connectWifi() {
            // Lấy MAC address của thiết bị (thông qua backend)
            fetch('/api/connect', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        alert('✅ Kết nối thành công! Chúc bạn dùng mạng vui vẻ.');
                        window.location.href = 'https://sites.google.com/view/pho-quynh/pho-quynh-torcy';
                    } else {
                        alert('❌ Lỗi: ' + data.message);
                    }
                });
        }
    </script>
</body>
</html>
